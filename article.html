<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Read a K-Culture Journal story.">
  <title>Story | K-Culture Journal</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#article-main">Skip to content</a>
  <header class="site-header article-header">
    <nav class="nav" aria-label="Article navigation">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">K</span><span>K-Culture<br><small>Journal</small></span></a>
      <a class="article-back" href="index.html">← <span data-back-label>All stories</span></a>
      <div class="language-tabs" role="group" aria-label="Language"><button type="button" data-language="en" aria-pressed="true">EN</button><button type="button" data-language="ko" aria-pressed="false">한국어</button></div>
    </nav>
  </header>
  <main id="article-main" class="article-page" aria-live="polite">
    <article id="article-content" hidden>
      <header class="article-hero">
        <p class="section-kicker" id="article-category"></p>
        <h1 id="article-title"></h1>
        <p class="article-deck" id="article-deck"></p>
        <div class="article-byline"><time id="article-date"></time><span id="article-read-time"></span></div>
      </header>
      <div class="article-art" id="article-art" aria-hidden="true"></div>
      <div class="article-body" id="article-body"></div>
    </article>
    <section class="article-missing" id="article-missing" hidden>
      <p class="section-kicker">404</p><h1>Story not found</h1><p>The requested story may have moved or is not available.</p><a class="text-link" href="index.html">Return to all stories →</a>
    </section>
  </main>
  <footer class="site-footer"><a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">K</span><span>K-Culture Journal</span></a><p>Independent notes on Korean culture.</p></footer>

  <script src="data/editorial.js"></script>
  <script src="data/articles.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/article.js"></script>
</body>
</html>
